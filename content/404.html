<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#1e1e1e;
            color:white;
            font-family:Arial, Helvetica, sans-serif;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;
        }

        .container{
            text-align:center;
        }

        h1{
            font-size:100px;
            color:#ff5555;
        }

        h2{
            margin-top:10px;
            font-size:35px;
        }

        p{
            margin-top:20px;
            font-size:18px;
            color:#cccccc;
        }

        a{
            display:inline-block;
            margin-top:35px;
            padding:12px 24px;

            background:#4CAF50;
            color:white;
            text-decoration:none;

            border-radius:8px;
            transition:0.3s;
        }

        a:hover{
            background:#45a049;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>404</h1>

    <h2>Page Not Found</h2>

    <p>
        The resource you requested does not exist on this server.
    </p>

    <a href="/">Return to Home</a>

</div>

</body>
</html>
